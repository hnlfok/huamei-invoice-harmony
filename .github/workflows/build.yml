name: Build HarmonyOS APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          java -version 2>&1 | head -1

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          for f in cmdline-tools/*; do [ -f "$f" ] && mv "$f" cmdline-tools/latest/ 2>/dev/null; done
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: ${{ runner.workspace }}/android-sdk
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$JAVA_HOME/bin:$PATH
          cd ${{ github.workspace }}/app
          chmod +x ../gradlew
          ../gradlew assembleDebug --no-daemon 2>&1 | tail -15

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 华美物流发货单-HarmonyOS
          path: ${{ github.workspace }}/app/build/outputs/apk/debug/*.apk
          retention-days: 30
