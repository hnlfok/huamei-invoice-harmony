name: Build HarmonyOS APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        id: java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sL "https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip" -o cmdline.zip
          unzip -o cmdline.zip
          mkdir -p latest
          mv cmdline-tools/* latest/ 2>/dev/null || true

      - name: Install Android SDK
        run: |
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Build APK
        run: |
          export JAVA_HOME=${{ steps.java.outputs.path }}
          export ANDROID_SDK_ROOT=/Users/runner/android-sdk
          export PATH=$JAVA_HOME/bin:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          WORKSPACE=${{ github.workspace }}
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $JAVA_HOME/bin/javac
          ls $ANDROID_SDK_ROOT/build-tools/34.0.0/dx
          echo "=== Files ==="
          find $WORKSPACE -name "*.java"
          # Compile Java
          mkdir -p $WORKSPACE/app/build/classes
          $JAVA_HOME/bin/javac -d $WORKSPACE/app/build/classes \
            -cp "$JAVA_HOME/lib/tools.jar" \
            $WORKSPACE/app/src/main/java/com/huamei/invoice/*.java 2>&1
          echo "=== DEX ==="
          mkdir -p $WORKSPACE/app/build/dex
          $ANDROID_SDK_ROOT/build-tools/34.0.0/dx --dex --output=$WORKSPACE/app/build/dex/app.dex $WORKSPACE/app/build/classes 2>&1
          echo "APK built"
          ls -lh $WORKSPACE/app/build/dex/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 华美物流发货单-HarmonyOS
          path: app/build/dex/app.dex
          retention-days: 30
