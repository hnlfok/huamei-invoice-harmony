name: Build HarmonyOS APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          for f in cmdline-tools/*; do [ -f "$f" ] && mv "$f" cmdline-tools/latest/ 2>/dev/null; done
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Setup Gradle 7.6.3
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6.3-bin.zip -O /tmp/gradle.zip
          unzip -oq /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-7.6.3/bin" >> $GITHUB_PATH
          /opt/gradle-7.6.3/bin/gradle -v | head -3

      - name: Generate Gradle wrapper
        run: |
          /opt/gradle-7.6.3/bin/gradle wrapper --gradle-version 7.6.3
          ls -la gradlew*

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: ${{ runner.workspace }}/android-sdk
          JAVA_HOME: ${{ runner.tool_cache }}/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon 2>&1 | tail -15

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 华美物流发货单-HarmonyOS
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
