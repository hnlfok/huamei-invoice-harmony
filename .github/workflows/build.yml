name: Build HarmonyOS APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        run: java -version 2>&1 | head -1

      - name: Setup Android SDK
        run: |
          brew install --cask android-sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Generate Gradle wrapper
        run: |
          cd ${{ github.workspace }}/app
          gradle wrapper --gradle-version 7.6.3
          ls -la gradlew*

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: ${{ runner.os == 'macOS' && env.ANDROID_HOME || env.ANDROID_SDK_ROOT }}
        run: |
          cd ${{ github.workspace }}/app
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 华美物流发货单-HarmonyOS
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
