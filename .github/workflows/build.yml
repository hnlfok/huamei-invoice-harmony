name: Build HarmonyOS APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip -O cmdline-tools.zip
          unzip -oq cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          for f in cmdline-tools/*; do [ -f "$f" ] && mv "$f" cmdline-tools/latest/ 2>/dev/null; done
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" "cmdline-tools;latest" 2>&1 | tail -3
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Build APK with aapt2 + javac + dx
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH
          JAVA_HOME=${{ runner.tool_cache }}/Java_Temurin-Hotspot_jdk/17.0.18-8/x64

          # Step 1: Compile Java to class files
          mkdir -p app/build/classes
          $JAVA_HOME/bin/javac -d app/build/classes \
            -cp "$JAVA_HOME/lib/tools.jar" \
            -source 8 -target 8 \
            app/src/main/java/com/huamei/invoice/*.java 2>&1 | head -20 || true

          # Step 2: If javac succeeded, convert to DEX
          if [ -d app/build/classes ]; then
            ls app/build/classes/
            mkdir -p app/build/dex
            $ANDROID_SDK_ROOT/build-tools/34.0.0/dx --dex --output=app/build/dex/app.dex app/build/classes 2>&1 | tail -5
            echo "DEX done"
          else
            echo "Skipping APK build - compilation had errors"
          fi

      - name: Build APK with Gradle (simple task, no plugin portal needed)
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export JAVA_HOME=${{ runner.tool_cache }}/Java_Temurin-Hotspot_jdk/17.0.18-8/x64
          export PATH=$JAVA_HOME/bin:$HOME/android-sdk/cmdline-tools/latest/bin:$PATH

          # Use the already-installed gradle from apt
          which gradle || sudo apt-get install -y gradle
          gradle -v | head -3

          # Try a simple gradle build with settings.gradle pluginManagement
          cat > settings.gradle << 'SGRADLE'
          pluginManagement {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/central' }
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'huamei_app'
          include ':app'
          SGRADLE

          cat > build.gradle << 'BGRADLE'
          buildscript {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/central' }
              }
          }
          allprojects {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/central' }
              }
          }
          BGRADLE

          # Run simple gradle assembleDebug
          gradle assembleDebug --no-daemon 2>&1 | tail -15

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 华美物流发货单-HarmonyOS
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/dex/app.dex
          retention-days: 30
